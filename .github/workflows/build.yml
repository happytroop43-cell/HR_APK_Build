name: Build Standalone APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Fixes the Node.js 20 deprecation warning logs across all runner stages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read

    steps:
    # Step 1: Download your source code files onto the empty runner instance
    - name: Checkout Source Code Files
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # Step 2: Set Up Java Development Kit (Fixed: Cache disabled to prevent root project scanning crashes)
    - name: Set Up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Step 3: Set Up Python Platform (Fixed: Cache disabled to prevent root requirements.txt scanning crashes)
    - name: Set Up Python Platform Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 4: Install Complete Linux Toolchain & Build Essentials
    - name: Install Complete System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          autotools-dev \
          libtool \
          libtool-bin \
          m4 \
          pkg-config \
          libffi-dev \
          libssl-dev \
          libsqlite3-dev \
          zlib1g-dev \
          libbz2-dev \
          libreadline-dev \
          libncurses5-dev \
          libjpeg-dev \
          libpng-dev \
          libfreetype6-dev \
          libharfbuzz0b \
          libwebp-dev \
          libtiff5-dev \
          git \
          zip \
          unzip \
          curl \
          wget \
          ccache \
          gettext

    # Step 5: Install Python Packaging Assets (Fixed: Pinned Cython < 3.0 to align with Kivy recipes)
    - name: Install Python Build Tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade "cython<3.0.0" virtualenv
        pip install buildozer

    # Step 6: Isolated Caching Matrix (Fixed: Key bumped to v4 to drop old corrupted libffi/NDK states)
    - name: Cache Buildozer & NDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
          ~/.android
        key: buildozer-ndk-v4-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-ndk-v4-${{ runner.os }}-

    # Step 7: Clean workspace prep (Fixed: Streamlined to prevent wiping active cache mounts)
    - name: Prepare Build Directory
      run: |
        rm -rf bin dist
        mkdir -p bin

    # Step 8: Multi-Layer Toolchain Compilation Pass
    # Fixes:
    # 1. Injects ACLOCAL_PATH to fix libffi macro error (LT_SYS_SYMBOL_USCORE) on Ubuntu runners.
    # 2. Scrubs ANDROID_NDK system variables to stop the runner from forcing NDK 27.
    # 3. Drops masked pipeline tricks (| tee) so true errors surface natively.
    - name: Compile Application Layout into Standalone APK
      run: |
        export ACLOCAL_PATH="/usr/share/aclocal"
        buildozer -v android debug
      env:
        BUILDOZER_ACCEPT_SDK_LICENSE: 1
        BUILDOZER_ALLOW_KIVY_USER_ROOT: 1
        ANDROID_NDK_HOME: ""
        ANDROID_NDK: ""
        ANDROID_NDK_ROOT: ""
        GRADLE_HOME: ""
      timeout-minutes: 120

    # Step 9: Asset Verification Stage
    - name: Verify APK Creation
      run: |
        if [ -f bin/*.apk ]; then
          echo "APK created successfully:"
          ls -lh bin/*.apk
          file bin/*.apk
        else
          echo "ERROR: APK file not found in bin directory"
          ls -lha bin/ || echo "bin directory does not exist"
          exit 1
        fi

    # Step 10: Export Package Outward (Triggers only on absolute success)
    - name: Export Output Package Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: Compiled-HR-System-APK
        path: bin/*.apk
        retention-days: 7
        compression-level: 6

    # Step 11: Fail-Safe Asset Retrieval (Fixed: Target path configured directly to user home directory space)
    - name: Upload Build Logs on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Build-Logs
        path: |
          ~/.buildozer/android/platform/build-*/build.log
          ~/.buildozer/buildozer.log
        if-no-files-found: warn
        retention-days: 14

    # Step 12: Collect Comprehensive Engine Diagnostics
    - name: Collect Debug Information
      if: failure()
      run: |
        echo "=== Python Version ==="
        python --version
        echo "=== Java Version ==="
        java -version
        echo "=== Buildozer Version ==="
        buildozer --version
        echo "=== Cython Version ==="
        pip show cython
        echo "=== Build Directory Size ==="
        du -sh ~/.buildozer 2>/dev/null || echo "Build directory not found"
        echo "=== Available Disk Space ==="
        df -h

    # Step 13: Absolute Close Hook (Fixed: Correct conditional formatting and trailing 'fi' block)
    - name: Build Status Summary
      if: always()
      run: |
        echo "Build completed with status: ${{ job.status }}"
        if [ "${{ job.status }}" = "success" ]; then
          echo "✓ APK build successful"
        fi
        
