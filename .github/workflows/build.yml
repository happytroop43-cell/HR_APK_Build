name: Build Standalone APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code Files
      uses: actions/checkout@v4

    - name: Install System Architecture Tool Chains
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config

    - name: Set Up Python Platform Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Deploy Buildozer Engine Packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Compile Application Layout into Standalone APK
      run: |
        yes y | buildozer -v android debug

    - name: Export Output Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-HR-System-APK
        path: bin/*.apk
