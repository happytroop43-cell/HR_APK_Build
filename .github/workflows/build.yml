name: Build Standalone APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read

    steps:
    # Step 1: Clone workspace source files
    - name: Checkout Source Code Files
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # Step 2: Establish Java Environment
    - name: Set Up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Step 3: Align target Python runtime
    - name: Set Up Python Platform Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 4: Provision system core libraries and compilation prerequisites
    - name: Install Complete System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          autotools-dev \
          libtool \
          libtool-bin \
          m4 \
          pkg-config \
          libffi-dev \
          libssl-dev \
          libsqlite3-dev \
          zlib1g-dev \
          libbz2-dev \
          libreadline-dev \
          libncurses5-dev \
          libjpeg-dev \
          libpng-dev \
          libfreetype6-dev \
          libharfbuzz0b \
          libwebp-dev \
          libtiff5-dev \
          git \
          zip \
          unzip \
          curl \
          wget \
          ccache \
          gettext

    # Step 5: Install Python packaging assets
    - name: Install Python Build Tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade "cython<3.0.0" virtualenv
        pip install buildozer

    # Step 6: Isolated Caching Framework Matrix
    # Incremented cache key to v11 to completely discard any half-baked or broken SDK runs
    - name: Cache Buildozer & NDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
          ~/.android
        key: buildozer-ndk-v11-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-ndk-v11-${{ runner.os }}-

    # Step 7: Flush output staging zones
    - name: Prepare Build Directory
      run: |
        rm -rf bin dist
        mkdir -p bin

    # Step 8: Multi-Layer Toolchain Compilation Pass
    # FIXED: Uses direct inline environment flags and forces python-for-android 
    # to pass license acceptance checks directly to the build tools layer.
    - name: Compile Application Layout into Standalone APK
      run: |
        export ACLOCAL_PATH="/usr/share/aclocal"
        
        # We append the direct accept-sdk-license hook straight into Buildozer's command arguments
        buildozer -v android debug -- --accept-sdk-license
      env:
        BUILDOZER_ACCEPT_SDK_LICENSE: 1
        BUILDOZER_ALLOW_KIVY_USER_ROOT: 1
        ANDROID_NDK_HOME: ""
        ANDROID_NDK: ""
        ANDROID_NDK_ROOT: ""
        GRADLE_HOME: ""
      timeout-minutes: 120

    # Step 9: Post-Compilation Integrity Assessment
    - name: Verify APK Creation
      run: |
        if [ -f bin/*.apk ]; then
          echo "APK created successfully:"
          ls -lh bin/*.apk
          file bin/*.apk
        else
          echo "ERROR: APK file not found in bin directory"
          ls -lha bin/ || echo "bin directory does not exist"
          exit 1
        fi

    # Step 10: Deliver Compiled Asset package
    - name: Export Output Package Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: Compiled-Strelizia-HR-System-APK
        path: bin/*.apk
        retention-days: 7
        compression-level: 6

    # Step 11: Fail-Safe Retrieval Mode
    - name: Upload Build Logs on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Engine-Build-Logs
        path: |
          ~/.buildozer
          buildozer.log
        if-no-files-found: warn
        retention-days: 14
        
